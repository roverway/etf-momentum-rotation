name: 实盘信号

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00（提前半小时，应对 GH Actions 队列延迟）
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 缓存 uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: 安装 uv
        run: |
          curl -LsSf https://astral.sh/uv/0.4.30/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 创建虚拟环境
        run: uv venv

      - name: 安装依赖
        run: uv pip install -r requirements.txt

      - name: 运行实盘信号
        run: |
          uv run python3 main.py signal 2>&1 | tee /tmp/signal_raw.txt

      - name: 推送到 Server酱
        run: |
          # 只保留 "信号生成" 之后的内容，放在代码块中保持格式
          {
            echo '```'
            sed -n '/信号生成/,$p' /tmp/signal_raw.txt
            echo '```'
          } > /tmp/signal_output.txt

          curl -X POST "https://sctapi.ftqq.com/${{ secrets.SERVERCHAN_KEY }}.send" \
            --data-urlencode "title=ETF实盘信号" \
            --data-urlencode "desp@/tmp/signal_output.txt"
